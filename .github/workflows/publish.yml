name: Publish crates.io

on:
  push:
    tags: [v*]

jobs:
  checks:
    name: Checks (stage1)
    uses: ./.github/workflows/checks.yml

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [checks]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone yuuka (workspace dep)
        run: git clone --depth 1 https://github.com/celestia-island/yuuka.git ../yuuka
      - uses: Swatinem/rust-cache@v2
      - name: Install celestia-devtools
        run: pip install git+https://github.com/celestia-island/celestia-devtools.git
      - run: cargo login ${{ secrets.CRATES_IO_API_TOKEN }}
      # celestia-devtools handles topological ordering, pre-flight existence
      # checks, smart error handling, and index-wait automatically.
      - run: python -m celestia_devtools.publish.crates
