[book]
title = "Documentación de Kirino"
description = "Un framework de autenticación zero-trust personalizable con soporte RBAC completo"
authors = ["celestia-island"]
language = "es"
src = "."

[build]
build-dir = "../../target/docs/es"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/kirino"
edit-url-template = "https://github.com/celestia-island/kirino/edit/dev/docs/es/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
