[book]
title = "Kirino 文档"
description = "一个可定制的零信任认证框架，提供完整的 RBAC 支持"
authors = ["celestia-island"]
language = "zh-CN"
src = "."

[build]
build-dir = "../../target/docs/zhs"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/kirino"
edit-url-template = "https://github.com/celestia-island/kirino/edit/dev/docs/zhs/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
