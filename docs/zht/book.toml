[book]
title = "Kirino 文件"
description = "一個可自訂的零信任認證框架，提供完整的 RBAC 支援"
authors = ["celestia-island"]
language = "zh-TW"
src = "."

[build]
build-dir = "../../target/docs/zht"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/celestia-island/kirino"
edit-url-template = "https://github.com/celestia-island/kirino/edit/dev/docs/zht/{path}"
additional-js = ["../theme/lang-switcher.js"]
additional-css = ["../theme/lang-switcher.css"]
