[package]
name = "kirino_session"
version = "0.5.0"
edition = "2021"
rust-version = "1.75"
description = "Distributed session management with JWT and PostgreSQL for kirino"
license = "SySL-1.0"
repository = "https://github.com/celestia-island/kirino"
documentation = "https://docs.rs/kirino_session"
keywords = ["session", "jwt", "authentication", "kirino"]

[dependencies]
serde = { version = "^1", features = ["derive"] }
serde_json = "^1"
jsonwebtoken = "^9"
uuid = { version = "^1", features = ["v4", "v7", "serde"] }
chrono = { version = "^0.4", features = ["serde"] }
tokio = { version = "^1", features = ["sync", "rt"] }
tracing = { version = "^0.1" }
thiserror = "^2"
sea-orm = { version = "^1", optional = true, features = ["sqlx-postgres", "runtime-tokio-rustls"] }
zeroize = { version = "^1", features = ["zeroize_derive"] }
axum = { version = "^0.8", optional = true }
axum-core = { version = "^0.5", optional = true }
actix-web = { version = "^4", optional = true }
actix-rt = { version = "^2", optional = true }
futures-util = { version = "^0.3", optional = true }

[features]
default = ["axum"]
postgres = ["sea-orm"]
axum = ["dep:axum", "dep:axum-core"]
actix = ["dep:actix-web", "dep:actix-rt", "dep:futures-util"]

[dev-dependencies]
tokio = { version = "^1", features = ["full"] }
